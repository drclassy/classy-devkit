<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Main gradient: deep indigo → violet -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <!-- Accent gradient: electric blue → purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)" stroke="#4338ca" stroke-width="1.5"/>

  <!-- Subtle inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#4338ca" stroke-width="0.5" opacity="0.4"/>

  <!-- Robot head body -->
  <rect x="58" y="72" width="84" height="68" rx="12" ry="12"
        fill="#1e1b4b" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Antenna -->
  <line x1="100" y1="72" x2="100" y2="55" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="50" r="5" fill="url(#accentGrad)" filter="url(#softGlow)"/>

  <!-- Left eye — terminal green -->
  <rect x="70" y="88" width="22" height="16" rx="4" ry="4" fill="#0d1117"/>
  <rect x="73" y="91" width="16" height="10" rx="2" ry="2" fill="#22c55e" opacity="0.9" filter="url(#glow)"/>

  <!-- Right eye — terminal green -->
  <rect x="108" y="88" width="22" height="16" rx="4" ry="4" fill="#0d1117"/>
  <rect x="111" y="91" width="16" height="10" rx="2" ry="2" fill="#22c55e" opacity="0.9" filter="url(#glow)"/>

  <!-- Blink cursor in left eye -->
  <rect x="84" y="92" width="2" height="8" rx="1" fill="#ffffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Mouth / status bar -->
  <rect x="74" y="114" width="52" height="10" rx="5" ry="5" fill="#0d1117"/>
  <!-- Green progress fill -->
  <rect x="76" y="116" width="36" height="6" rx="3" ry="3" fill="url(#accentGrad)" opacity="0.9">
    <animate attributeName="width" values="8;36;36;8" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Left arm -->
  <rect x="36" y="84" width="20" height="8" rx="4" ry="4"
        fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
  <!-- Gear on left arm -->
  <circle cx="33" cy="88" r="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="33" cy="88" r="2.5" fill="#6366f1" opacity="0.8"/>

  <!-- Right arm -->
  <rect x="144" y="84" width="20" height="8" rx="4" ry="4"
        fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
  <!-- Gear on right arm -->
  <circle cx="167" cy="88" r="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="167" cy="88" r="2.5" fill="#6366f1" opacity="0.8"/>

  <!-- Chest code brackets -->
  <text x="82" y="108" font-family="monospace" font-size="8" fill="#6366f1" opacity="0.5">&lt;/&gt;</text>

  <!-- Legs -->
  <rect x="76" y="140" width="18" height="16" rx="4" ry="4"
        fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
  <rect x="106" y="140" width="18" height="16" rx="4" ry="4"
        fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>

  <!-- Feet -->
  <rect x="72" y="154" width="26" height="8" rx="4" ry="4" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <rect x="102" y="154" width="26" height="8" rx="4" ry="4" fill="#312e81" stroke="#4338ca" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="100" y="185" font-family="'Segoe UI', system-ui, sans-serif" font-size="9"
        fill="#6366f1" text-anchor="middle" letter-spacing="2" opacity="0.8">CLAUDESY</text>
</svg>
